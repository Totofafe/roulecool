<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>RouleCool — Widget Carte Grist</title>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script src="https://docs.getgrist.com/grist-plugin-api.js"></script>
  <script src="seuils.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: Arial, sans-serif;
      background: #1a1a1a;
      color: #f0f0f0;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ── TOOLBAR ── */
    #toolbar {
      background: #222;
      border-bottom: 1px solid #333;
      padding: 8px 12px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      flex-shrink: 0;
      z-index: 1000;
    }

    .toolbar-label {
      font-size: 0.7rem;
      color: #888;
      white-space: nowrap;
    }

    select {
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 4px;
      color: #f0f0f0;
      font-size: 0.75rem;
      padding: 4px 8px;
      cursor: pointer;
      outline: none;
    }

    select:focus { border-color: #2E7D32; }

    .sep {
      width: 1px;
      height: 20px;
      background: #444;
      flex-shrink: 0;
    }

    /* ── STATS ── */
    #stats-bar {
      display: flex;
      gap: 16px;
      margin-left: auto;
      flex-shrink: 0;
    }

    .stat {
      font-size: 0.7rem;
      color: #888;
      white-space: nowrap;
    }

    .stat span {
      color: #A5D6A7;
      font-weight: bold;
    }

    /* ── CONFORT MINI BAR ── */
    .mini-bar {
      display: flex;
      height: 6px;
      width: 80px;
      border-radius: 3px;
      overflow: hidden;
      gap: 1px;
      align-self: center;
    }

    .mini-bar div { border-radius: 1px; }

    /* ── CARTE ── */
    #map {
      flex: 1;
      width: 100%;
    }

    .leaflet-container { background: #1a1a1a; }

    /* ── LÉGENDE ── */
    .legend {
      background: rgba(30,30,30,0.92);
      border: 1px solid #444;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: 12px;
      color: #f0f0f0;
      line-height: 22px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    }

    .legend h4 {
      margin: 0 0 8px 0;
      font-size: 12px;
      color: #A5D6A7;
      letter-spacing: 0.05em;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .legend-dot {
      width: 12px; height: 12px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .legend-seuil {
      color: #666;
      font-size: 10px;
      margin-left: auto;
      padding-left: 8px;
    }

    /* ── PANORAMAX ── */
    .btn-panoramax {
      background: transparent;
      color: #4a9eda;
      border: 1px solid #4a9eda;
      border-radius: 4px;
      font-size: 0.72rem;
      padding: 4px 10px;
      cursor: pointer;
      transition: all 0.2s;
      white-space: nowrap;
    }
    .btn-panoramax:hover { background: rgba(74,158,218,0.15); }
    .btn-panoramax.active { background: #4a9eda; color: white; }

    /* ── LOADING ── */
    #loading {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(30,30,30,0.95);
      border: 1px solid #444;
      border-radius: 8px;
      padding: 20px 30px;
      font-size: 0.85rem;
      color: #A5D6A7;
      z-index: 2000;
      display: none;
    }

    #loading.visible { display: block; }
  </style>
</head>
<body>

<!-- ── TOOLBAR ── -->
<div id="toolbar">
  <span class="toolbar-label">Contributeur</span>
  <select id="filterPseudo">
    <option value="">Tous</option>
  </select>

  <div class="sep"></div>

  <span class="toolbar-label">Date</span>
  <select id="filterDate">
    <option value="">Toutes</option>
  </select>

  <div class="sep"></div>

  <div class="mini-bar" id="miniBar">
    <div id="mbConf" style="background:#2E7D32;width:33%"></div>
    <div id="mbAcce" style="background:#A5D6A7;width:33%"></div>
    <div id="mbInco" style="background:#F44336;width:34%"></div>
  </div>

  <div class="sep"></div>
  <button class="btn-panoramax" id="btnPanoramax">📷 Panoramax</button>

  <div id="stats-bar">
    <div class="stat">Points : <span id="statPoints">—</span></div>
    <div class="stat">Trajets : <span id="statTrajets">—</span></div>
    <div class="stat">Contributeurs : <span id="statContribs">—</span></div>
    <div class="stat">🟢 <span id="statConf">—</span>%</div>
    <div class="stat">🟩 <span id="statAcce">—</span>%</div>
    <div class="stat">🔴 <span id="statInco">—</span>%</div>
  </div>
</div>

<!-- ── CARTE ── -->
<div id="map"></div>
<div id="loading">⏳ Chargement des données…</div>

<script>
// ── CARTE ────────────────────────────────────────────────
const map = L.map('map', { zoomControl: true }).setView([48.8566, 2.3522], 12);

L.tileLayer('https://{s}.basemaps.cartocdn.com/light_all/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO',
  subdomains: 'abcd',
  maxZoom: 19
}).addTo(map);

// Légende dynamique depuis seuils.js
const legend = L.control({ position: 'bottomright' });
legend.onAdd = () => {
  const t = getLegendText();
  const div = L.DomUtil.create('div', 'legend');
  div.innerHTML = `
    <h4>🎯 RouleCool</h4>
    <div class="legend-item">
      <div class="legend-dot" style="background:${SEUILS.couleurs.confortable}"></div>
      Confortable <span class="legend-seuil">${t.confortable}</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:${SEUILS.couleurs.acceptable}"></div>
      Acceptable <span class="legend-seuil">${t.acceptable}</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:${SEUILS.couleurs.inconfortable}"></div>
      Inconfortable <span class="legend-seuil">${t.inconfortable}</span>
    </div>
  `;
  return div;
};
legend.addTo(map);

// ── ÉTAT ─────────────────────────────────────────────────
let allRecords = [];
let mapLayer   = null;

// ── GRIST API ────────────────────────────────────────────
grist.ready({
  requiredAccess: 'read table',
  columns: [
    { name: 'latitude',    type: 'Numeric' },
    { name: 'longitude',   type: 'Numeric' },
    { name: 'vibration',   type: 'Numeric' },
    { name: 'score',       type: 'Text'    },
    { name: 'couleur',     type: 'Text'    },
    { name: 'vitesse',     type: 'Numeric' },
    { name: 'pseudo',      type: 'Text'    },
    { name: 'date_trajet', type: 'Text'    },
    { name: 'nom_trajet',  type: 'Text'    },
  ]
});

grist.onRecords(records => {
  allRecords = records;
  updateFilters(records);
  renderMap(records);
});

// ── FILTRES ───────────────────────────────────────────────
function updateFilters(records) {
  const pseudos = [...new Set(records.map(r => r.pseudo).filter(Boolean))].sort();
  const dates   = [...new Set(records.map(r => r.date_trajet).filter(Boolean))].sort().reverse();

  const selP = document.getElementById('filterPseudo');
  const selD = document.getElementById('filterDate');

  const prevP = selP.value;
  const prevD = selD.value;

  selP.innerHTML = '<option value="">Tous</option>'
    + pseudos.map(p => `<option value="${p}" ${p===prevP?'selected':''}>${p}</option>`).join('');

  selD.innerHTML = '<option value="">Toutes</option>'
    + dates.map(d => `<option value="${d}" ${d===prevD?'selected':''}>${d}</option>`).join('');
}

function getFiltered() {
  const pseudo = document.getElementById('filterPseudo').value;
  const date   = document.getElementById('filterDate').value;
  return allRecords.filter(r =>
    (!pseudo || r.pseudo === pseudo) &&
    (!date   || r.date_trajet === date)
  );
}

// ── RENDU CARTE ──────────────────────────────────────────
function renderMap(records) {
  if (mapLayer) map.removeLayer(mapLayer);
  mapLayer = L.layerGroup().addTo(map);

  if (records.length === 0) return;

  // Regrouper par trajet
  const trajets = {};
  for (const r of records) {
    const key = `${r.pseudo||'?'}__${r.nom_trajet||'?'}__${r.date_trajet||'?'}`;
    if (!trajets[key]) trajets[key] = [];
    trajets[key].push(r);
  }

  const allBounds = [];

  for (const [key, pts] of Object.entries(trajets)) {
    const [pseudo, nom, date] = key.split('__');
    const ptsFiltres = pts.filter(p => p.latitude && p.longitude);
    if (ptsFiltres.length === 0) continue;

    allBounds.push([ptsFiltres[0].latitude, ptsFiltres[0].longitude]);

    let segmentCoords = [];
    let couleurCourante = null;

    for (let i = 0; i < ptsFiltres.length; i++) {
      const p = ptsFiltres[i];
      const couleur = p.couleur || '#999';

      if (couleurCourante === null) {
        couleurCourante = couleur;
        segmentCoords = [[p.latitude, p.longitude]];
      } else if (couleur !== couleurCourante) {
        segmentCoords.push([p.latitude, p.longitude]);
        L.polyline(segmentCoords, { color: couleurCourante, weight: 6, opacity: 0.8 })
          .bindPopup(`
            <div style="font-family:Arial;font-size:12px;min-width:180px;">
              <b style="font-size:13px;">${ptsFiltres[i-1].score || '—'}</b><br>
              <hr style="margin:5px 0;border-color:#ddd;">
              Vibration : <b>${(ptsFiltres[i-1].vibration||0).toFixed(2)} m/s²</b><br>
              Vitesse : ${(ptsFiltres[i-1].vitesse||0).toFixed(1)} km/h<br>
              <hr style="margin:5px 0;border-color:#ddd;">
              <i style="color:#666;font-size:11px;">
                👤 ${pseudo}<br>📍 ${nom}<br>📅 ${date}
              </i>
            </div>
          `).addTo(mapLayer);
        couleurCourante = couleur;
        segmentCoords = [[p.latitude, p.longitude]];
      } else {
        segmentCoords.push([p.latitude, p.longitude]);
      }
    }

    // Dernier segment
    if (segmentCoords.length > 1) {
      const last = ptsFiltres[ptsFiltres.length - 1];
      L.polyline(segmentCoords, { color: couleurCourante, weight: 6, opacity: 0.8 })
        .bindPopup(`
          <div style="font-family:Arial;font-size:12px;min-width:180px;">
            <b style="font-size:13px;">${last.score || '—'}</b><br>
            <hr style="margin:5px 0;border-color:#ddd;">
            Vibration : <b>${(last.vibration||0).toFixed(2)} m/s²</b><br>
            Vitesse : ${(last.vitesse||0).toFixed(1)} km/h<br>
            <hr style="margin:5px 0;border-color:#ddd;">
            <i style="color:#666;font-size:11px;">
              👤 ${pseudo}<br>📍 ${nom}<br>📅 ${date}
            </i>
          </div>
        `).addTo(mapLayer);
    }
  }

  // Ajuster la vue
  if (allBounds.length > 0) {
    map.fitBounds(allBounds, { padding: [30, 30] });
  }

  // Mettre à jour les stats
  updateStats(records, Object.keys(trajets).length);
}

// ── STATS ────────────────────────────────────────────────
function updateStats(records, nbTrajets) {
  const total   = records.length;
  const pseudos = new Set(records.map(r => r.pseudo).filter(Boolean));
  const nConf   = records.filter(r => r.score === 'Confortable').length;
  const nAcce   = records.filter(r => r.score === 'Acceptable').length;
  const nInco   = records.filter(r => r.score === 'Inconfortable').length;

  document.getElementById('statPoints').textContent   = total.toLocaleString('fr');
  document.getElementById('statTrajets').textContent  = nbTrajets;
  document.getElementById('statContribs').textContent = pseudos.size;
  document.getElementById('statConf').textContent     = total ? Math.round(100*nConf/total) : 0;
  document.getElementById('statAcce').textContent     = total ? Math.round(100*nAcce/total) : 0;
  document.getElementById('statInco').textContent     = total ? Math.round(100*nInco/total) : 0;

  // Mini barre
  if (total > 0) {
    document.getElementById('mbConf').style.width = (100*nConf/total) + '%';
    document.getElementById('mbAcce').style.width = (100*nAcce/total) + '%';
    document.getElementById('mbInco').style.width = (100*nInco/total) + '%';
  }
}

// ── EVENTS FILTRES ────────────────────────────────────────
document.getElementById('filterPseudo').addEventListener('change', () => {
  renderMap(getFiltered());
});

document.getElementById('filterDate').addEventListener('change', () => {
  renderMap(getFiltered());
});

// ── RESIZE ───────────────────────────────────────────────
window.addEventListener('resize', () => map.invalidateSize());
setTimeout(() => map.invalidateSize(), 300);

// ── PANORAMAX ────────────────────────────────────────────
const PANORAMAX_API = 'https://api.panoramax.xyz/api/search';
let panoramaxLayer  = null;
let panoramaxActif  = false;

function couleurMarqueur(dateStr) {
  if (!dateStr) return { bg: '#888888', label: 'Date inconnue' };
  const mois = (Date.now() - new Date(dateStr).getTime()) / (1000 * 60 * 60 * 24 * 30);
  if (mois < 6)  return { bg: '#1565C0', label: 'Récente (< 6 mois)' };
  if (mois < 18) return { bg: '#F9A825', label: 'Moyenne (6-18 mois)' };
  return           { bg: '#424242', label: 'Ancienne (> 18 mois)' };
}

function makeCameraIcon(bg) {
  return L.divIcon({
    html: `<div style="background:${bg};border:2px solid white;border-radius:50%;width:22px;height:22px;display:flex;align-items:center;justify-content:center;font-size:12px;box-shadow:0 2px 6px rgba(0,0,0,0.4);">📷</div>`,
    className: '',
    iconSize: [22, 22],
    iconAnchor: [11, 11]
  });
}

function dedoublonner(features) {
  const grille = {};
  features.forEach(f => {
    const [lon, lat] = f.geometry.coordinates;
    const cle = `${Math.round(lat * 1000)}_${Math.round(lon * 1000)}`;
    const date = f.properties?.datetime || '';
    if (!grille[cle] || date > grille[cle].properties.datetime) {
      grille[cle] = f;
    }
  });
  return Object.values(grille);
}

async function chargerPanoramax() {
  if (panoramaxLayer) { map.removeLayer(panoramaxLayer); panoramaxLayer = null; }
  if (!panoramaxActif) return;

  const bounds = map.getBounds();
  const bbox = `${bounds.getWest()},${bounds.getSouth()},${bounds.getEast()},${bounds.getNorth()}`;

  try {
    const res = await fetch(`${PANORAMAX_API}?bbox=${bbox}&limit=200`);
    if (!res.ok) return;
    const data = await res.json();
    const brutes = data.features || [];
    if (brutes.length === 0) return;

    const features = dedoublonner(brutes);
    panoramaxLayer = L.layerGroup().addTo(map);

    features.forEach(f => {
      const [lon, lat] = f.geometry.coordinates;
      const uuid    = f.id;
      const date    = f.properties?.datetime?.slice(0, 10) || '—';
      const { bg, label } = couleurMarqueur(f.properties?.datetime);
      const imgUrl  = `https://api.panoramax.xyz/api/pictures/${uuid}/sd.jpg`;
      const viewUrl = `https://api.panoramax.xyz/#focus=pic&pic=${uuid}`;

      L.marker([lat, lon], { icon: makeCameraIcon(bg) })
        .bindPopup(`
          <div style="font-family:Arial;font-size:12px;min-width:200px;">
            <b>📷 Photo Panoramax</b><br>
            <span style="color:#666;font-size:11px;">📅 ${date} — ${label}</span><br>
            <img src="${imgUrl}" alt="Photo Panoramax"
                 onerror="this.style.display='none'"
                 style="width:100%;max-width:260px;border-radius:4px;margin-top:6px;">
            <div style="margin-top:6px;">
              <a href="${viewUrl}" target="_blank" style="color:#4a9eda;font-size:11px;">
                Voir sur Panoramax ↗
              </a>
            </div>
          </div>
        `, { maxWidth: 280 })
        .addTo(panoramaxLayer);
    });

  } catch(e) {
    console.warn('Erreur Panoramax :', e);
  }
}

document.getElementById('btnPanoramax').addEventListener('click', () => {
  panoramaxActif = !panoramaxActif;
  const btn = document.getElementById('btnPanoramax');
  if (panoramaxActif) {
    btn.classList.add('active');
    btn.textContent = '📷 Masquer';
    chargerPanoramax();
  } else {
    btn.classList.remove('active');
    btn.textContent = '📷 Panoramax';
    if (panoramaxLayer) { map.removeLayer(panoramaxLayer); panoramaxLayer = null; }
  }
});

// Recharger si la vue change (et si actif)
map.on('moveend', () => { if (panoramaxActif) chargerPanoramax(); });
</script>
</body>
</html>
